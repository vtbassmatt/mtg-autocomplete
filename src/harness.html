<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="pico.violet.min.css">
    <script src="mtgauto.js" type="module" defer></script>
    <title>Hello world!</title>
  </head>
  <body>
    <header class="container">
      <hgroup>
        <h1>mtg-autocomplete</h1>
        <p>Start typing a Magic card name below to see it in action.</p>
      </hgroup>
    </header>
    <main class="container">
      <div class="grid">
        <form>
          <fieldset>
            <label>
              Search
              <input name="search" id="searchBox" placeholder="Llanowar Elves..." type="search"
                    autocomplete="off" autocapitalize="off" autocorrect="off" autofocus="on"/>
            </label>
          </fieldset>
          <input type="submit" value="Search"/>
        </form>

        <div>
          <h2>Results</h2>
          <div id="results">
            <i style="color: var(--pico-muted-color)">Run a search...</i>
          </div>
        </div>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
